<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ReputeIndia Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0A0A0A; --black2:#111111; --gold:#C9A84C; --gold-light:#E8C96A; --gold-dark:#A07830; --white:#F5F0E8; --grey:#888888; --grey2:#444444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 60px;background:rgba(10,10,10,0.98);border-bottom:1px solid #1a1a1a;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold);letter-spacing:2px;}
.nav-back{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color 0.3s;}
.nav-back:hover{color:var(--gold);}
.page-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;}
.login-box{background:var(--black2);border:1px solid #1a1a1a;padding:56px 48px;width:100%;max-width:440px;position:relative;}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-dark));}
.eyebrow{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.title{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--white);margin-bottom:8px;}
.title em{color:var(--gold);font-style:italic;}
.sub{font-size:12px;color:var(--grey);margin-bottom:36px;line-height:1.7;}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.form-input{width:100%;background:var(--black);border:1px solid #2a2a2a;color:var(--white);padding:13px 16px;font-family:'Montserrat',sans-serif;font-size:12px;outline:none;transition:border 0.3s;}
.form-input:focus{border-color:var(--gold-dark);}
.form-input::placeholder{color:var(--grey2);}
.btn{width:100%;padding:15px;background:var(--gold);color:var(--black);font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;border:none;cursor:pointer;transition:all 0.3s;margin-top:8px;}
.btn:hover{background:var(--gold-light);}
.btn:disabled{background:var(--grey2);cursor:not-allowed;}
.form-note{font-size:10px;color:var(--grey2);text-align:center;margin-top:14px;letter-spacing:1px;}
.reg-link{color:var(--gold);text-decoration:none;}
.reg-link:hover{text-decoration:underline;}
.error-msg{background:rgba(220,50,50,0.1);border:1px solid rgba(220,50,50,0.3);color:#ff6b6b;font-size:11px;padding:12px 16px;margin-bottom:20px;display:none;}
.step{display:none;}
.step.active{display:block;}
@media(max-width:600px){nav{padding:16px 20px;}.login-box{padding:36px 24px;}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" stroke="#C9A84C" stroke-width="1"/><polygon points="16,6 18.5,12.5 25.5,12.5 20,16.5 22,23 16,19.5 10,23 12,16.5 6.5,12.5 13.5,12.5" fill="#C9A84C"/></svg>
    <span class="nav-logo-text">ReputeIndia</span>
  </a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<div class="page-wrap">
  <div class="login-box">
    <div class="eyebrow">Client Dashboard Access</div>
    <h1 class="title">Welcome <em>Back</em></h1>
    <p class="sub">Enter your registered WhatsApp number to access your reputation dashboard.</p>

    <div class="error-msg" id="errorMsg"></div>

    <!-- Step 1: Phone -->
    <div class="step active" id="step1">
      <div class="form-group">
        <label class="form-label">Registered WhatsApp Number</label>
        <input type="tel" class="form-input" id="loginPhone" placeholder="Enter your 10-digit number">
      </div>
      <button class="btn" onclick="findBusiness()">Continue →</button>
      <p class="form-note">
        New to ReputeIndia? <a href="register.html" class="reg-link">Start free trial</a>
      </p>
    </div>

    <!-- Step 2: Confirm -->
    <div class="step" id="step2">
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:48px;margin-bottom:16px;">✅</div>
        <p id="businessConfirm" style="font-size:14px;color:var(--white);margin-bottom:8px;"></p>
        <p style="font-size:11px;color:var(--grey);margin-bottom:28px;">Is this your business?</p>
        <button class="btn" onclick="goToDashboard()">Yes, Open Dashboard →</button>
        <br><br>
        <a href="#" onclick="backToStep1()" style="font-size:10px;color:var(--grey);text-decoration:none;letter-spacing:2px;text-transform:uppercase;">Not my business</a>
      </div>
    </div>
  </div>
</div>

<script>
const BACKEND = 'https://repute-india.onrender.com';
let foundBusiness = null;

async function findBusiness() {
  const btn = document.querySelector('#step1 .btn');
  const err = document.getElementById('errorMsg');
  err.style.display = 'none';

  const phone = document.getElementById('loginPhone').value.trim().replace(/\D/g,'');
  if (phone.length < 10) {
    err.textContent = 'Please enter a valid 10-digit number.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Looking up...';

  try {
    const res = await fetch(`${BACKEND}/api/businesses`);
    const data = await res.json();

    if (data.success) {
      const biz = data.businesses.find(b => 
        b.phone === phone || 
        b.phone === '91'+phone || 
        (b.whatsapp_number && b.whatsapp_number.includes(phone))
      );

      if (biz) {
        foundBusiness = biz;
        localStorage.setItem('ri_business_id', biz.id);
        localStorage.setItem('ri_business_name', biz.business_name);
        localStorage.setItem('ri_phone', phone);

        document.getElementById('businessConfirm').textContent = biz.business_name;
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
      } else {
        err.textContent = 'No account found with this number. Please register first.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Continue →';
      }
    }
  } catch(e) {
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Continue →';
  }
}

function goToDashboard() {
  window.location.href = 'dashboard.html';
}

function backToStep1() {
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  document.querySelector('#step1 .btn').disabled = false;
  document.querySelector('#step1 .btn').textContent = 'Continue →';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') findBusiness();
});

// Auto-login if already registered
if (localStorage.getItem('ri_business_id')) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
